<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quiz Carrière — TotalEnergies</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --red:#E8002D; --orange:#F5800A; --yellow:#F5C400; --green:#00A550; --blue:#0064A8;
    --text:#0D1117; --muted:#6B7280; --border:rgba(0,0,0,0.08); --white:#FFFFFF; --bg:#F4F6FA;
  }
  html { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); }
  body { min-height:100vh; display:flex; justify-content:center; background:var(--bg); }

  /* TOP BAR */
  .topbar {
    position:fixed; top:0; left:0; right:0; z-index:100; height:56px;
    background:rgba(255,255,255,0.96); border-bottom:1px solid var(--border);
    backdrop-filter:blur(12px); display:flex; align-items:center;
    justify-content:space-between; padding:0 20px;
  }
  .topbar-logo { display:flex; align-items:center; gap:10px; }
  .topbar-icon {
    width:32px; height:32px; border-radius:9px;
    background:linear-gradient(135deg,var(--red),var(--orange));
    display:flex; align-items:center; justify-content:center;
    color:white; font-size:14px; font-weight:900;
  }
  .topbar-name { font-size:14px; font-weight:800; color:var(--text); }
  .topbar-sub  { font-size:10px; color:var(--muted); }
  .mode-toggle { display:flex; gap:6px; }
  .mode-btn { padding:5px 13px; border-radius:20px; font-size:11px; font-weight:700; font-family:inherit; border:1.5px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.15s; }
  .mode-btn.on { background:var(--orange); color:white; border-color:var(--orange); }

  .app { width:100%; max-width:560px; padding:72px 16px 60px; }
  .screen { display:none; flex-direction:column; gap:16px; }
  .screen.active { display:flex; }
  .card { background:var(--white); border:1px solid var(--border); border-radius:18px; padding:22px; box-shadow:0 1px 8px rgba(0,0,0,0.05); }

  /* STRIPE */
  .stripe { display:flex; height:5px; border-radius:100px; overflow:hidden; margin-bottom:18px; gap:3px; }
  .stripe div { flex:1; border-radius:100px; }

  /* LEVEL CARDS */
  .levels-grid { display:flex; flex-direction:column; gap:10px; }
  .level-card {
    border-radius:16px; border:2px solid var(--border); padding:16px 18px;
    cursor:pointer; transition:all 0.15s; position:relative; overflow:hidden;
    display:flex; align-items:center; gap:14px; background:var(--white);
  }
  .level-card:active:not(.locked) { opacity:0.85; }
  .level-card.locked { opacity:0.5; cursor:not-allowed; }
  .level-card.current { border-color:var(--orange); box-shadow:0 0 0 3px rgba(245,128,10,0.12); }
  .level-icon { font-size:28px; flex-shrink:0; }
  .level-info { flex:1; }
  .level-name { font-size:15px; font-weight:800; color:var(--text); margin-bottom:2px; }
  .level-desc { font-size:12px; color:var(--muted); margin-bottom:6px; }
  .level-meta { display:flex; gap:8px; align-items:center; }
  .lm-badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; }
  .level-lock { font-size:18px; flex-shrink:0; }
  .level-prog { height:4px; border-radius:100px; background:var(--bg); overflow:hidden; margin-top:6px; }
  .level-prog-bar { height:100%; border-radius:100px; transition:width 0.4s; }

  /* COLORS PER LEVEL */
  .lv1 { border-color:rgba(0,165,80,0.3); }
  .lv1 .level-name { color:var(--green); }
  .lv1.current { border-color:var(--green); box-shadow:0 0 0 3px rgba(0,165,80,0.1); }
  .lv2 { border-color:rgba(0,100,168,0.3); }
  .lv2 .level-name { color:var(--blue); }
  .lv2.current { border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,100,168,0.1); }
  .lv3 { border-color:rgba(245,128,10,0.3); }
  .lv3 .level-name { color:var(--orange); }
  .lv3.current { border-color:var(--orange); box-shadow:0 0 0 3px rgba(245,128,10,0.1); }
  .lv4 { border-color:rgba(232,0,45,0.3); }
  .lv4 .level-name { color:var(--red); }
  .lv4.current { border-color:var(--red); box-shadow:0 0 0 3px rgba(232,0,45,0.1); }

  .xp-bar { background:var(--white); border:1px solid var(--border); border-radius:14px; padding:16px 18px; }
  .xp-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:10px; }
  .xp-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .xp-label { font-size:13px; font-weight:700; color:var(--text); }
  .xp-val { font-size:13px; color:var(--muted); }
  .xp-track { height:8px; border-radius:100px; background:var(--bg); overflow:hidden; }
  .xp-fill { height:100%; border-radius:100px; transition:width 0.5s; background:linear-gradient(90deg,var(--orange),var(--red)); }

  /* QUIZ */
  .quiz-header { background:white; border:1px solid var(--border); border-radius:16px; padding:14px 18px; box-shadow:0 1px 6px rgba(0,0,0,0.04); }
  .quiz-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .q-num { font-size:12px; color:var(--muted); font-weight:600; }
  .q-timer { font-size:12px; font-weight:800; padding:3px 12px; border-radius:20px; background:rgba(0,100,168,0.1); color:var(--blue); min-width:46px; text-align:center; transition:all 0.3s; }
  .q-timer.hot { background:rgba(232,0,45,0.1); color:var(--red); }
  .q-level-badge { font-size:10px; font-weight:700; padding:2px 10px; border-radius:20px; }
  .prog-wrap { background:var(--bg); border-radius:100px; height:4px; overflow:hidden; }
  .prog-bar { height:100%; border-radius:100px; transition:width 0.4s; }
  .q-card { background:white; border:1px solid var(--border); border-radius:18px; padding:22px 20px; box-shadow:0 1px 8px rgba(0,0,0,0.05); }
  .q-badge { display:inline-flex; align-items:center; gap:6px; font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; padding:4px 12px; border-radius:20px; margin-bottom:14px; }
  .b-chiffres { background:rgba(0,100,168,0.1); color:var(--blue); }
  .b-finance  { background:rgba(0,165,80,0.1); color:var(--green); }
  .b-strategie{ background:rgba(245,128,10,0.1); color:var(--orange); }
  .q-text { font-size:17px; font-weight:800; color:var(--text); line-height:1.4; margin-bottom:6px; }
  .q-hint { font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:18px; }
  .answers { display:flex; flex-direction:column; gap:9px; }
  .ans { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:12px; padding:13px 14px; text-align:left; font-family:inherit; font-size:14px; font-weight:500; color:var(--text); cursor:pointer; display:flex; align-items:center; gap:10px; line-height:1.4; transition:border-color 0.15s, background 0.15s; }
  .ans:hover:not(:disabled) { border-color:var(--orange); background:rgba(245,128,10,0.04); }
  .ans:disabled { cursor:default; }
  .ans.correct { border-color:var(--green); background:rgba(0,165,80,0.07); }
  .ans.wrong   { border-color:var(--red);   background:rgba(232,0,45,0.05); }
  .ans.reveal  { border-color:var(--green); background:rgba(0,165,80,0.05); }
  .ans-l { width:26px; height:26px; border-radius:7px; flex-shrink:0; border:1.5px solid var(--border); background:white; font-size:11px; font-weight:800; color:var(--muted); display:flex; align-items:center; justify-content:center; }
  .correct .ans-l { background:var(--green); color:white; border-color:var(--green); }
  .wrong   .ans-l { background:var(--red);   color:white; border-color:var(--red); }
  .reveal  .ans-l { background:var(--green); color:white; border-color:var(--green); }
  .fb { border-radius:11px; padding:13px 15px; font-size:13px; line-height:1.6; display:none; margin-top:12px; }
  .fb.show { display:block; }
  .fb.ok { background:rgba(0,165,80,0.08); border:1px solid rgba(0,165,80,0.2); color:#007A3A; }
  .fb.ko { background:rgba(232,0,45,0.06); border:1px solid rgba(232,0,45,0.2); color:var(--red); }
  .btn-next { width:100%; background:white; border:1.5px solid rgba(245,128,10,0.35); border-radius:13px; padding:14px; font-size:14px; font-weight:700; font-family:inherit; color:var(--orange); cursor:pointer; display:none; box-shadow:0 1px 6px rgba(0,0,0,0.04); }
  .btn-next.show { display:block; }

  /* RESULT */
  .result-top { text-align:center; }
  .r-emoji { font-size:50px; margin-bottom:6px; }
  .r-title { font-size:26px; font-weight:900; color:var(--text); margin-bottom:4px; }
  .r-score { font-size:54px; font-weight:900; letter-spacing:-0.03em; line-height:1; }
  .r-sub { font-size:13px; color:var(--muted); margin-top:8px; line-height:1.6; }
  .unlock-banner { background:linear-gradient(135deg,rgba(245,128,10,0.1),rgba(232,0,45,0.08)); border:1.5px solid rgba(245,128,10,0.25); border-radius:14px; padding:16px 18px; text-align:center; }
  .unlock-icon { font-size:28px; margin-bottom:6px; }
  .unlock-title { font-size:15px; font-weight:800; color:var(--orange); margin-bottom:4px; }
  .unlock-desc { font-size:12px; color:var(--muted); }
  .bd-card { background:white; border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,0.04); }
  .bd-row { display:flex; justify-content:space-between; align-items:center; padding:13px 18px; border-bottom:1px solid var(--border); font-size:13px; }
  .bd-row:last-child { border-bottom:none; }
  .bd-label { color:var(--muted); }
  .bd-val { font-weight:800; }
  .vg { color:var(--green); } .vm { color:var(--orange); } .vb { color:var(--red); }
  .btn-back { width:100%; background:white; color:var(--text); border:1.5px solid var(--border); border-radius:13px; padding:14px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; }
  .btn-retry { width:100%; background:var(--orange); color:white; border:none; border-radius:13px; padding:14px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; margin-bottom:8px; }

  /* TOAST */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--text); color:white; padding:11px 20px; border-radius:11px; font-size:13px; font-weight:600; opacity:0; pointer-events:none; transition:opacity 0.3s; z-index:999; white-space:nowrap; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<header class="topbar">
  <div class="topbar-logo">
    <div class="topbar-icon">T</div>
    <div>
      <div class="topbar-name">Quiz TotalEnergies</div>
      <div class="topbar-sub">Préparation Entretien RH Groupe</div>
    </div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn on" id="m-quiz" onclick="setMode('quiz')">QCM</button>
    <button class="mode-btn" id="m-flash" onclick="setMode('flash')">Flash</button>
  </div>
</header>

<div class="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="card">
      <div class="stripe">
        <div style="background:var(--red)"></div><div style="background:var(--orange)"></div>
        <div style="background:var(--yellow)"></div><div style="background:var(--green)"></div>
        <div style="background:var(--blue)"></div>
      </div>
      <h1 style="font-size:26px;font-weight:900;letter-spacing:-0.02em;margin-bottom:6px">Quiz <span style="color:var(--red)">TotalEnergies</span></h1>
      <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px">4 niveaux progressifs · Débloque en progressant · 10 questions par niveau</p>
      <div class="levels-grid" id="levels-grid"></div>
    </div>
    <div class="card" id="xp-card">
      <div class="xp-title">Progression globale</div>
      <div class="xp-row">
        <span class="xp-label" id="xp-level-name">Débutant</span>
        <span class="xp-val" id="xp-val">0 XP</span>
      </div>
      <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header">
      <div class="quiz-meta">
        <span class="q-num" id="q-num">1/10</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="q-level-badge" id="q-level-badge"></span>
          <span class="q-timer" id="q-timer">30s</span>
        </div>
      </div>
      <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    </div>
    <div class="q-card">
      <div><span class="q-badge" id="q-badge">Chiffres</span></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-hint" id="q-hint"></div>
      <div class="answers" id="answers"></div>
      <div class="fb" id="fb"></div>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQ()">Question suivante →</button>
  </div>

  <!-- FLASH -->
  <div class="screen" id="screen-flash">
    <div style="background:white;border:1px solid var(--border);border-radius:20px;padding:40px 22px 32px;box-shadow:0 1px 10px rgba(0,0,0,0.06);text-align:center;min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer" id="flashcard" onclick="flipCard()">
      <div id="fc-front" style="display:flex;flex-direction:column;gap:12px;align-items:center">
        <span class="q-badge" id="fc-badge"></span>
        <div id="fc-q" style="font-size:18px;font-weight:800;color:var(--text);line-height:1.4"></div>
        <div style="font-size:11px;color:#bbb;margin-top:4px">Appuie pour voir la réponse</div>
      </div>
      <div id="fc-back" style="display:none;flex-direction:column;gap:10px;align-items:center">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted)">Réponse</div>
        <div id="fc-a" style="font-size:16px;font-weight:700;color:var(--green);line-height:1.5"></div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--muted);text-align:center" id="fc-count">Carte 1/30</div>
    <div style="display:flex;gap:10px">
      <button onclick="fcNext(false)" style="flex:1;padding:13px;border-radius:12px;font-size:13px;font-weight:700;font-family:inherit;border:1.5px solid var(--red);background:rgba(232,0,45,0.04);color:var(--red);cursor:pointer">Je ne savais pas</button>
      <button onclick="fcNext(true)" style="flex:1;padding:13px;border-radius:12px;font-size:13px;font-weight:700;font-family:inherit;border:1.5px solid var(--green);background:rgba(0,165,80,0.05);color:var(--green);cursor:pointer">Je savais !</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="card result-top">
      <div class="stripe">
        <div style="background:var(--red)"></div><div style="background:var(--orange)"></div>
        <div style="background:var(--yellow)"></div><div style="background:var(--green)"></div>
        <div style="background:var(--blue)"></div>
      </div>
      <div class="r-emoji" id="r-emoji"></div>
      <div class="r-title" id="r-title"></div>
      <div class="r-score" id="r-score"></div>
      <div class="r-sub" id="r-sub"></div>
    </div>
    <div class="unlock-banner" id="unlock-banner" style="display:none">
      <div class="unlock-icon" id="unlock-icon"></div>
      <div class="unlock-title" id="unlock-title"></div>
      <div class="unlock-desc" id="unlock-desc"></div>
    </div>
    <div class="bd-card" id="bd"></div>
    <button class="btn-retry" onclick="retryLevel()">Rejouer ce niveau</button>
    <button class="btn-back" onclick="goHome()">Retour aux niveaux</button>
  </div>

</div>

<script>
// ── LEVELS CONFIG ──
const LEVELS = [
  {id:1, name:"Débutant",     icon:"🌱", color:"var(--green)",  timer:40, threshold:0,  unlock:0,  lv:"lv1", desc:"Questions fondamentales — définitions et ordres de grandeur"},
  {id:2, name:"Intermédiaire",icon:"📘", color:"var(--blue)",   timer:30, threshold:60, unlock:1,  lv:"lv2", desc:"Comprendre les mécanismes financiers et stratégiques"},
  {id:3, name:"Avancé",       icon:"🔥", color:"var(--orange)", timer:25, threshold:70, unlock:2,  lv:"lv3", desc:"Maîtrise des indicateurs et de la stratégie du groupe"},
  {id:4, name:"Expert",       icon:"🏆", color:"var(--red)",    timer:15, threshold:80, unlock:3,  lv:"lv4", desc:"Niveau entretien RH Groupe — précision et rapidité exigées"},
];

// ── QUESTIONS par niveau ──
const Q = {
  1: [ // DÉBUTANT — définitions, notions de base
    {cat:"chiffres",q:"Quel est le CFFO de TotalEnergies en 2025 ?",hint:"Cash Flow des Opérations — chiffre à citer absolument.",a:["22,3 Mds$","27,8 Mds$","31,4 Mds$","19,6 Mds$"],c:1,e:"CFFO 2025 : 27,8 Mds$."},
    {cat:"chiffres",q:"Quelle était la performance boursière de TotalEnergies en 2025 ?",hint:"À comparer avec les autres majors.",a:["+8%","+14%","+20%","+31%"],c:2,e:"+20% en 2025."},
    {cat:"chiffres",q:"Quel est le gearing de TotalEnergies fin 2025 ?",hint:"Dette nette / capitaux propres.",a:["8,2%","14,7%","22,1%","31,5%"],c:1,e:"Gearing 14,7% — faible, signe de solidité."},
    {cat:"finance",q:"Qu'est-ce que le gearing ?",hint:"Ratio d'endettement fondamental.",a:["Ratio dividende / BPA","Dette nette / capitaux propres","EBITDA / CA","Coût du capital"],c:1,e:"Gearing = Dette nette / Capitaux propres."},
    {cat:"finance",q:"Que signifie l'acronyme EBITDA ?",hint:"Solde intermédiaire de gestion très utilisé.",a:["Earnings Before Interest Taxes Depreciation Amortization","Equity Base Including Tax Distribution Account","Estimated Budget Including Total Debt Amount","Earnings Before Income Tax Distribution Assessment"],c:0,e:"EBITDA = Résultat avant intérêts, impôts, amortissements. Proxy du cash-flow opérationnel."},
    {cat:"finance",q:"Qu'est-ce qu'un PPA ?",hint:"TotalEnergies en a signé avec Google, ByteDance, Microsoft.",a:["Planned Production Agreement","Power Purchase Agreement","Petroleum Production Allocation","Portfolio Performance Assessment"],c:1,e:"PPA = Power Purchase Agreement. Contrat d'achat d'électricité long terme."},
    {cat:"strategie",q:"Quels sont les deux projets majeurs de TotalEnergies en Namibie ?",hint:">1,5 Mds barils de réserves potentielles.",a:["Oryx et Kalahari","Venus et Mopane","Namib et Atlantic","Orange et Kudu"],c:1,e:"Projets Venus et Mopane."},
    {cat:"strategie",q:"Quelle est la stratégie de TotalEnergies face à la transition énergétique ?",hint:"Modèle différencié des autres majors.",a:["Sortie totale des hydrocarbures d'ici 2035","Hydrocarbures financent l'électricité et les renouvelables","Focalisation exclusive sur le GNL","Recentrage sur l'upstream uniquement"],c:1,e:"Modèle multi-énergie : hydrocarbures (cash machine) financent la croissance dans l'électricité et les renouvelables."},
    {cat:"chiffres",q:"Quel est le coût de production Upstream de TotalEnergies en 2025 ?",hint:"L'un des plus bas de l'industrie.",a:["3$/boe","5$/boe","8$/boe","12$/boe"],c:1,e:"5$/boe — très compétitif."},
    {cat:"strategie",q:"Qu'est-ce que le GNL ?",hint:"Axe majeur de la stratégie de transition TotalEnergies.",a:["Gaz Naturel Liquéfié","Gestion Numérique des Liquidités","Garantie de Non-Livraison","Gestion des Niveaux de Liquidité"],c:0,e:"GNL = Gaz Naturel Liquéfié. TotalEnergies est l'un des leaders mondiaux."},
  ],
  2: [ // INTERMÉDIAIRE
    {cat:"chiffres",q:"Quel est le résultat net ajusté de TotalEnergies pour 2025 ?",hint:"Exclut les éléments exceptionnels.",a:["12,1 Mds$","18,3 Mds$","15,6 Mds$","21,2 Mds$"],c:2,e:"Résultat net ajusté 2025 : 15,6 Mds$."},
    {cat:"chiffres",q:"Quel est le CAPEX net de TotalEnergies en 2025 ?",hint:"Investissements nets du groupe.",a:["14,2 Mds$","17,1 Mds$","20,5 Mds$","11,8 Mds$"],c:1,e:"CAPEX net 2025 : 17,1 Mds$."},
    {cat:"finance",q:"Que mesure le ROACE ?",hint:"Indicateur phare pour les groupes pétroliers intégrés.",a:["Rentabilité des actions cotées","Retour sur capitaux employés en moyenne","Rentabilité nette après impôts","Ratio de couverture des intérêts"],c:1,e:"Return On Average Capital Employed = résultat net opérationnel / capitaux employés moyens."},
    {cat:"finance",q:"Qu'est-ce que le boe ?",hint:"Unité commune pour comparer différentes sources d'énergie.",a:["Balance of Earnings","Barrel of Oil Equivalent","Base Operating Expenditure","Budget of Operations Estimate"],c:1,e:"boe = Barrel of Oil Equivalent."},
    {cat:"finance",q:"Quelle est la différence entre résultat net et résultat net ajusté ?",hint:"L'ajusté reflète la performance récurrente.",a:["Aucune différence","L'ajusté exclut les éléments exceptionnels (dépréciations, plus-values...)","L'ajusté inclut les dividendes reçus","L'ajusté est calculé avant impôts"],c:1,e:"Le résultat net ajusté exclut les éléments non récurrents pour refléter la performance opérationnelle."},

    {cat:"strategie",q:"Quel est le breakeven de TotalEnergies pour couvrir dividende + CAPEX ?",hint:"Indicateur de résilience aux cycles pétroliers.",a:["~20$/baril","~40$/baril","~65$/baril","~80$/baril"],c:1,e:"Breakeven ~40$/baril — permet de maintenir le dividende même en prix bas."},

    {cat:"finance",q:"Qu'est-ce que le dividende progressif de TotalEnergies ?",hint:"Engagement envers les actionnaires même en période de prix bas.",a:["Dividende variable selon le résultat net","Dividende augmentant chaque année, maintenu même en cycle bas","Dividende fixe depuis 10 ans","Dividende distribué uniquement si prix du pétrole >60$"],c:1,e:"TotalEnergies s'engage sur un dividende croissant + rachats d'actions variables selon le contexte."},
    {cat:"strategie",q:"Quelle est la politique de rémunération des actionnaires de TotalEnergies ?",hint:"Mix deux composantes.",a:["Dividende uniquement","Dividende progressif + rachats d'actions selon le prix du pétrole","Pas de dividende — réinvestissement total","Dividende fixe indépendant des résultats"],c:1,e:"Dividende progressif + rachats d'actions variables (breakeven ~40$/bbl)."},
    {cat:"strategie",q:"Quel est le positionnement de TotalEnergies sur les renouvelables à horizon 2030 ?",hint:"Ambition chiffrée en GW.",a:["Présence symbolique <5 GW","35+ GW en 2030","Leader mondial >100 GW","Retrait au profit du GNL"],c:1,e:"TotalEnergies vise 35+ GW de capacité renouvelable d'ici 2030."},
  ],
  4: [ // EXPERT — précision + rapidité (15s)
    {cat:"chiffres",q:"Citez 3 chiffres clés TotalEnergies 2025 en moins de 10 secondes.",hint:"CFFO, résultat net ajusté, ROACE — les 3 essentiels.",a:["CFFO 27,8 Mds$ / RN ajusté 15,6 Mds$ / ROACE 12,6%","CFFO 22,3 Mds$ / RN ajusté 18 Mds$ / ROACE 10%","CFFO 31 Mds$ / RN ajusté 15,6 Mds$ / ROACE 14%","CFFO 27,8 Mds$ / RN ajusté 12 Mds$ / ROACE 12,6%"],c:0,e:"Les 3 essentiels : CFFO 27,8 Mds$ — RN ajusté 15,6 Mds$ — ROACE 12,6%."},
    {cat:"finance",q:"Comment calculer le ROACE à partir des états financiers ?",hint:"Formule exacte — niveau entretien financier.",a:["Résultat net / Total actif","Résultat net opérationnel après impôts / Capitaux employés moyens","EBITDA / Dette nette","FCF / Capitalisation boursière"],c:1,e:"ROACE = RNOAI (Résultat Net Opérationnel Après Impôts) / Capitaux Employés Moyens."},
    {cat:"finance",q:"Si le WACC est de 8% et qu'un projet génère un ROACE de 12%, que peut-on conclure ?",hint:"Comparaison ROACE vs WACC.",a:["Le projet détruit de la valeur","Le projet crée de la valeur (ROACE > WACC)","Le projet est neutre","On ne peut pas conclure sans le FCF"],c:1,e:"ROACE (12%) > WACC (8%) → le projet crée de la valeur économique. C'est l'essence de la création de valeur."},
    {cat:"strategie",q:"Quel est le lien entre la stratégie namibienne et la politique de dividende de TotalEnergies ?",hint:"Réflexion stratégique intégrée — niveau CODIR.",a:["Aucun lien direct","Les revenus namibiens financeront les dividendes futurs dès la FID","Le cash des hydrocarbures existants finance le dividende pendant que Namibie matûrit","La Namibie remplacera le GNL dans le mix"],c:2,e:"Les hydrocarbures en production financent le dividende (breakeven 40$) pendant que les grands projets (Namibie) préparent la croissance future."},
    {cat:"chiffres",q:"Quel est le gearing cible de TotalEnergies à moyen terme ?",hint:"Objectif de structure financière communiqué au marché.",a:["<5%","<20%","<30%","<10%"],c:1,e:"TotalEnergies cible un gearing <20% — 14,7% en 2025, dans la cible."},
    {cat:"finance",q:"Qu'implique un breakeven à 40$/baril pour TotalEnergies si le Brent chute à 50$ ?",hint:"Marge de sécurité financière.",a:["Dividende en danger immédiat","10$/baril de marge — dividende et CAPEX couverts, FCF positif","Break-even atteint — résultat nul","Réduction automatique du CAPEX"],c:1,e:"À 50$/bbl avec breakeven 40$, il reste 10$/bbl de marge. Dividende et CAPEX couverts, FCF positif disponible pour rachats."},
    {cat:"strategie",q:"Pourquoi TotalEnergies maintient-il une production d'hydrocarbures élevée alors que la transition est en cours ?",hint:"Logique financière et stratégique du modèle multi-énergie.",a:["Par dépendance aux actifs passés","Pour financer l'électricité et les renouvelables via le cash-flow — le groupe a besoin des deux","Pour satisfaire les actionnaires uniquement","Faute d'opportunités dans les renouvelables"],c:1,e:"Les hydrocarbures génèrent le cash (CFFO 27,8 Mds$) qui finance l'électricité, le GNL et les renouvelables. Logique de transition financée de l'intérieur."},
    {cat:"finance",q:"Dans une valorisation DCF de TotalEnergies, quel taux d'actualisation utiliseriez-vous et pourquoi ?",hint:"Lien entre WACC et risque sectoriel.",a:["5% — taux sans risque actuel","8-10% — WACC d'un major pétrolier intégré (risque sectoriel + prime de marché)","15% — risque élevé du secteur","3% — coût de la dette uniquement"],c:1,e:"WACC 8-10% pour un major pétrolier intégré : taux sans risque (~4%) + prime de marché × bêta sectoriel (~0.8-1.0)."},
    {cat:"strategie",q:"Comment TotalEnergies se différencie-t-il de BP et Shell sur la stratégie de transition ?",hint:"TotalEnergies a choisi une voie distincte en 2023.",a:["TotalEnergies a abandonné les renouvelables","TotalEnergies maintient la croissance hydrocarbures ET les renouvelables, là où BP/Shell ont ralenti les deux","TotalEnergies a fusionné avec un acteur renouvelable","TotalEnergies se concentre sur le nucléaire"],c:1,e:"BP et Shell ont réduit leurs ambitions renouvelables sous pression des actionnaires. TotalEnergies maintient sa double trajectoire : croissance hydrocarbures (Namibie, GNL) + renouvelables (35 GW 2030)."},
    {cat:"chiffres",q:"Quel est le ROACE minimum que TotalEnergies exige pour valider un nouveau projet d'investissement ?",hint:"Lié au WACC et à la création de valeur.",a:["5%","Supérieur au WACC du groupe (~8-10%)","15% minimum","20% pour les projets Upstream"],c:1,e:"TotalEnergies exige un ROACE supérieur au WACC (~8-10%) pour tout nouveau projet — condition sine qua non de création de valeur."},
  ],
};

const CAT_LABELS = {chiffres:"Chiffres TotalEnergies",finance:"Finance Corporate",strategie:"Stratégie Groupe"};
const CAT_ICONS  = {chiffres:"📊",finance:"💰",strategie:"🌍"};
const CAT_COLORS = {chiffres:"b-chiffres",finance:"b-finance",strategie:"b-strategie"};
const PROG_COLORS= {chiffres:"var(--blue)",finance:"var(--green)",strategie:"var(--orange)"};

let mode='quiz', currentLevel=1, qs=[], cur=0, score=0, catSc={};
let timerInt, tLeft;
let fcIdx=0, fcQ=[], fcKnown=0;

// ── STORAGE ──
function getProgress(){return JSON.parse(localStorage.getItem('te_progress')||'{"xp":0,"unlocked":[1],"bestScores":{}}');}
function saveProgress(p){localStorage.setItem('te_progress',JSON.stringify(p));}

function getXP(){return getProgress().xp;}
function addXP(n){const p=getProgress();p.xp=(p.xp||0)+n;saveProgress(p);}
function isUnlocked(lv){return getProgress().unlocked.includes(lv);}
function unlockLevel(lv){const p=getProgress();if(!p.unlocked.includes(lv)){p.unlocked.push(lv);saveProgress(p);return true;}return false;}
function getBestScore(lv){return getProgress().bestScores[lv]||0;}
function saveBestScore(lv,s){const p=getProgress();if(!p.bestScores[lv]||s>p.bestScores[lv]){p.bestScores[lv]=s;saveProgress(p);}}

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function setMode(m){mode=m;document.getElementById('m-quiz').className='mode-btn'+(m==='quiz'?' on':'');document.getElementById('m-flash').className='mode-btn'+(m==='flash'?' on':'');}
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}

// ── HOME ──
function renderHome(){
  const lvls=LEVELS;
  document.getElementById('levels-grid').innerHTML=lvls.map(lv=>{
    const unlocked=isUnlocked(lv.id);
    const best=getBestScore(lv.id);
    const pct=Math.round(best/10*100);
    const cls=`level-card ${lv.lv}${!unlocked?' locked':''}${lv.id===getActiveLevel()?' current':''}`;
    const lockIcon=!unlocked?`<div class="level-lock">🔒</div>`:`<div class="level-lock" style="color:${lv.color}">${best>0?pct+'%':''}</div>`;
    const progHtml=unlocked&&best>0?`<div class="level-prog"><div class="level-prog-bar" style="width:${pct}%;background:${lv.color}"></div></div>`:'';
    const reqTxt=!unlocked?`Débloqué à ${LEVELS[lv.id-2].threshold}% au niveau ${LEVELS[lv.id-2].name}`:`${lv.timer}s par question`;
    return`<div class="${cls}" onclick="selectLevel(${lv.id})">
      <div class="level-icon">${lv.icon}</div>
      <div class="level-info">
        <div class="level-name">${lv.name}</div>
        <div class="level-desc">${lv.desc}</div>
        <div class="level-meta">
          <span class="lm-badge" style="background:${lv.color}22;color:${lv.color}">${reqTxt}</span>
        </div>
        ${progHtml}
      </div>
      ${lockIcon}
    </div>`;
  }).join('');

  // XP bar
  const xp=getXP();
  const maxXp=400;
  const pct=Math.min(100,Math.round(xp/maxXp*100));
  document.getElementById('xp-val').textContent=xp+' XP';
  document.getElementById('xp-fill').style.width=pct+'%';
  const lvName=xp<50?'Débutant':xp<150?'Intermédiaire':xp<300?'Avancé':'Expert';
  document.getElementById('xp-level-name').textContent=lvName+' · '+xp+'/'+maxXp+' XP';
}

function getActiveLevel(){
  for(let i=LEVELS.length-1;i>=0;i--){if(isUnlocked(LEVELS[i].id))return LEVELS[i].id;}
  return 1;
}

function selectLevel(id){
  if(!isUnlocked(id)){toast('Niveau verrouillé — atteins le seuil au niveau précédent !');return;}
  if(mode==='flash'){startFlash(id);return;}
  startQuiz(id);
}

// ── QUIZ ──
function startQuiz(lv){
  currentLevel=lv;
  const lvConf=LEVELS[lv-1];
  qs=shuffle(Q[lv]);cur=0;score=0;
  catSc={chiffres:[0,0],finance:[0,0],strategie:[0,0]};
  // level badge color
  const badge=document.getElementById('q-level-badge');
  badge.textContent=lvConf.icon+' '+lvConf.name;
  badge.style.cssText=`background:${lvConf.color}18;color:${lvConf.color};font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;`;
  showScreen('screen-quiz');
  renderQ();
}

function startTimer(){
  clearInterval(timerInt);
  const t=LEVELS[currentLevel-1].timer;
  tLeft=t;
  const el=document.getElementById('q-timer');
  el.textContent=tLeft+'s';el.className='q-timer';
  timerInt=setInterval(()=>{
    tLeft--;el.textContent=tLeft+'s';
    if(tLeft<=Math.min(8,t*0.3))el.className='q-timer hot';
    if(tLeft<=0){clearInterval(timerInt);timeUp();}
  },1000);
}

function timeUp(){
  document.querySelectorAll('.ans').forEach(b=>b.disabled=true);
  const q=qs[cur];
  q._s.forEach((a,i)=>{if(a.o===q.c)document.querySelectorAll('.ans')[i].classList.add('reveal');});
  showFb(false,'Temps écoulé ! '+q.e);
  const nb=document.getElementById('btn-next');
  nb.className='btn-next show';
  nb.textContent=cur+1<qs.length?'Question suivante →':'Voir mes résultats →';
}

function renderQ(){
  const q=qs[cur];
  document.getElementById('prog-bar').style.width=(cur/qs.length*100)+'%';
  document.getElementById('prog-bar').style.background=LEVELS[currentLevel-1].color;
  document.getElementById('q-num').textContent=`${cur+1}/${qs.length}`;
  const badge=document.getElementById('q-badge');
  badge.textContent=CAT_ICONS[q.cat]+' '+CAT_LABELS[q.cat];
  badge.className='q-badge '+CAT_COLORS[q.cat];
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-hint').textContent=q.hint;
  const sh=q.a.map((a,i)=>({t:a,o:i}));shuffle(sh);q._s=sh;
  document.getElementById('answers').innerHTML=sh.map((a,i)=>`
    <button class="ans" onclick="answer(${i})">
      <span class="ans-l">${String.fromCharCode(65+i)}</span>${a.t}
    </button>`).join('');
  document.getElementById('fb').className='fb';
  document.getElementById('btn-next').className='btn-next';
  startTimer();
}

function answer(idx){
  clearInterval(timerInt);
  const q=qs[cur];const btns=document.querySelectorAll('.ans');
  btns.forEach(b=>b.disabled=true);
  const ok=q._s[idx].o===q.c;catSc[q.cat][1]++;
  if(ok){btns[idx].classList.add('correct');score++;catSc[q.cat][0]++;}
  else{btns[idx].classList.add('wrong');q._s.forEach((a,i)=>{if(a.o===q.c)btns[i].classList.add('reveal');});}
  showFb(ok,(ok?'Correct ! ':'Incorrect. ')+q.e);
  const nb=document.getElementById('btn-next');
  nb.className='btn-next show';
  nb.textContent=cur+1<qs.length?'Question suivante →':'Voir mes résultats →';
}

function showFb(ok,txt){const el=document.getElementById('fb');el.className='fb show '+(ok?'ok':'ko');el.textContent=txt;}
function nextQ(){cur++;if(cur>=qs.length)showResult();else renderQ();}

function showResult(){
  clearInterval(timerInt);
  const pct=Math.round(score/qs.length*100);
  const lvConf=LEVELS[currentLevel-1];
  saveBestScore(currentLevel,score);

  // XP
  const xpGained=score*5+(pct>=70?20:0)+(pct>=90?30:0);
  addXP(xpGained);

  let em,ti,su;
  if(pct>=90){em='🏆';ti='Parfait !';su="Score exceptionnel. Tu maîtrises ce niveau à fond.";}
  else if(pct>=70){em='💪';ti='Bon niveau';su="Bonne maîtrise. Rejoue pour viser 90%+.";}
  else if(pct>=50){em='📚';ti='À consolider';su="Des lacunes à combler. Revois les feedbacks et rejoue.";}
  else{em='🔁';ti='À retravailler';su="Recommence après avoir relu les notions clés.";}

  document.getElementById('r-emoji').textContent=em;
  document.getElementById('r-title').textContent=ti;
  document.getElementById('r-score').style.color=lvConf.color;
  document.getElementById('r-score').textContent=score+'/'+qs.length+' ('+pct+'%)';
  document.getElementById('r-sub').textContent=su+'  +'+xpGained+' XP gagnés !';

  // Check unlock next level
  const nextLv=currentLevel+1;
  const unlockBanner=document.getElementById('unlock-banner');
  if(nextLv<=4 && pct>=lvConf.threshold && !isUnlocked(nextLv)){
    const didUnlock=unlockLevel(nextLv);
    if(didUnlock){
      const nextConf=LEVELS[nextLv-1];
      unlockBanner.style.display='block';
      document.getElementById('unlock-icon').textContent='🔓';
      document.getElementById('unlock-title').textContent='Niveau '+nextConf.name+' débloqué !';
      document.getElementById('unlock-desc').textContent='Tu peux maintenant accéder aux questions '+nextConf.name.toLowerCase()+'.';
    } else { unlockBanner.style.display='none'; }
  } else { unlockBanner.style.display='none'; }

  const cats={chiffres:'📊 Chiffres',finance:'💰 Finance',strategie:'🌍 Stratégie'};
  document.getElementById('bd').innerHTML=Object.entries(catSc).map(([c,[ok,tot]])=>{
    if(!tot)return'';
    const p=tot>0?Math.round(ok/tot*100):0;
    const cl=p>=80?'vg':p>=50?'vm':'vb';
    return`<div class="bd-row"><span class="bd-label">${cats[c]}</span><span class="bd-val ${cl}">${ok}/${tot} (${p}%)</span></div>`;
  }).join('');

  showScreen('screen-result');
}

function retryLevel(){startQuiz(currentLevel);}
function goHome(){renderHome();showScreen('screen-home');}

// ── FLASHCARD ──
function startFlash(lv){
  currentLevel=lv||1;
  fcQ=shuffle(Q[currentLevel]);fcIdx=0;fcKnown=0;
  document.getElementById('fc-front').style.display='flex';
  document.getElementById('fc-back').style.display='none';
  showScreen('screen-flash');renderFlash();
}
function renderFlash(){
  const q=fcQ[fcIdx];
  const b=document.getElementById('fc-badge');
  b.textContent=CAT_ICONS[q.cat]+' '+CAT_LABELS[q.cat];
  b.className='q-badge '+CAT_COLORS[q.cat];
  document.getElementById('fc-q').textContent=q.q;
  document.getElementById('fc-a').textContent=q.a[q.c];
  document.getElementById('fc-count').textContent=`Carte ${fcIdx+1}/${fcQ.length} · ${fcKnown} connues · Niveau ${LEVELS[currentLevel-1].name}`;
}
function flipCard(){
  const fc=document.getElementById('flashcard');
  const fr=document.getElementById('fc-front');
  const bk=document.getElementById('fc-back');
  const flipped=bk.style.display==='flex';
  fr.style.display=flipped?'flex':'none';
  bk.style.display=flipped?'none':'flex';
}
function fcNext(k){
  if(k)fcKnown++;fcIdx++;
  if(fcIdx>=fcQ.length){toast(`Fini ! ${fcKnown}/${fcQ.length} connues.`);setTimeout(()=>{fcIdx=0;fcKnown=0;fcQ=shuffle(Q[currentLevel]);renderFlash();},1500);return;}
  document.getElementById('fc-front').style.display='flex';
  document.getElementById('fc-back').style.display='none';
  renderFlash();
}

// Init
renderHome();
</script>
