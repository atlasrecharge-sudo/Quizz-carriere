<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quiz Carrière — Khalil</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0D1117;
    --surface: #161B22;
    --surface2: #1C2330;
    --border: rgba(255,255,255,0.08);
    --text: #E6EDF3;
    --muted: #7D8590;
    --blue: #58A6FF;
    --green: #3FB950;
    --red: #F85149;
    --orange: #F0883E;
    --purple: #BC8CFF;
    --yellow: #E3B341;
  }
  html, body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  .app {
    width: 100%; max-width: 560px;
    padding: 20px 16px 40px;
    position: relative;
  }

  /* ── SCREEN HOME ── */
  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; }

  .home { align-items: center; text-align: center; gap: 24px; }
  .home-logo { font-size: 48px; }
  .home-title { font-size: 32px; font-weight: 900; letter-spacing: -0.02em; }
  .home-title span { color: var(--blue); }
  .home-sub { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 340px; }

  .categories { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin: 8px 0; }
  .cat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: left;
  }
  .cat-pill-icon { font-size: 18px; margin-bottom: 4px; display: block; }
  .cat-pill-label { font-size: 11px; font-weight: 700; color: var(--text); }
  .cat-pill-count { font-size: 10px; color: var(--muted); }

  .btn-start {
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 15px; font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-start:active { opacity: 0.85; }

  /* ── SCREEN QUIZ ── */
  .quiz { gap: 20px; }

  .progress-bar-wrap {
    width: 100%;
    background: var(--surface);
    border-radius: 100px;
    height: 4px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--blue);
    border-radius: 100px;
    transition: width 0.4s ease;
  }

  .quiz-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--muted); font-weight: 500;
  }
  .quiz-cat {
    font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .c-finance { background: rgba(63,185,80,0.12); color: var(--green); }
  .c-chiffres { background: rgba(88,166,255,0.12); color: var(--blue); }
  .c-strategie { background: rgba(240,136,62,0.12); color: var(--orange); }
  .c-carriere { background: rgba(188,140,255,0.12); color: var(--purple); }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px;
  }
  .question-text {
    font-size: 17px; font-weight: 700; color: var(--text);
    line-height: 1.45; margin-bottom: 6px;
  }
  .question-hint {
    font-size: 12px; color: var(--muted); margin-bottom: 20px; line-height: 1.5;
  }

  .answers { display: flex; flex-direction: column; gap: 10px; }
  .answer-btn {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: left;
    font-family: inherit;
    font-size: 14px; font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex; align-items: center; gap: 10px;
    line-height: 1.4;
  }
  .answer-btn:active:not(:disabled) { opacity: 0.85; }
  .answer-btn:hover:not(:disabled) { border-color: rgba(88,166,255,0.4); }
  .answer-btn.correct { border-color: var(--green); background: rgba(63,185,80,0.1); }
  .answer-btn.wrong { border-color: var(--red); background: rgba(248,81,73,0.08); }
  .answer-btn.reveal { border-color: var(--green); background: rgba(63,185,80,0.06); }
  .answer-btn:disabled { cursor: default; }
  .answer-letter {
    width: 26px; height: 26px; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--border);
    font-size: 11px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--muted);
  }
  .correct .answer-letter { background: var(--green); color: #fff; border-color: var(--green); }
  .wrong .answer-letter { background: var(--red); color: #fff; border-color: var(--red); }
  .reveal .answer-letter { background: var(--green); color: #fff; border-color: var(--green); }

  .feedback {
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13px; line-height: 1.55;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.2); color: #7ee787; }
  .feedback.ko { background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.2); color: #ffa198; }

  .btn-next {
    width: 100%;
    background: var(--surface);
    border: 1px solid rgba(88,166,255,0.3);
    border-radius: 14px;
    padding: 15px;
    font-size: 14px; font-weight: 700; font-family: inherit;
    color: var(--blue);
    cursor: pointer;
    display: none;
    transition: background 0.15s;
  }
  .btn-next.show { display: block; }
  .btn-next:active { background: rgba(88,166,255,0.1); }

  /* ── SCREEN RESULT ── */
  .result { align-items: center; text-align: center; gap: 20px; }
  .result-emoji { font-size: 56px; }
  .result-title { font-size: 28px; font-weight: 900; letter-spacing: -0.02em; }
  .result-score {
    font-size: 64px; font-weight: 900; color: var(--blue);
    letter-spacing: -0.03em; line-height: 1;
  }
  .result-sub { font-size: 14px; color: var(--muted); }
  .result-breakdown {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .rb-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .rb-row:last-child { border-bottom: none; }
  .rb-label { color: var(--muted); }
  .rb-val { font-weight: 700; color: var(--text); }
  .rb-val.good { color: var(--green); }
  .rb-val.mid { color: var(--yellow); }
  .rb-val.bad { color: var(--red); }

  .btn-retry {
    width: 100%;
    background: var(--blue);
    color: #fff; border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 15px; font-weight: 700; font-family: inherit;
    cursor: pointer;
  }
</style>
</head>

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  questions = shuffle([...QUESTIONS]);
  current = 0; score = 0;
  catScores = { chiffres: [0,0], finance: [0,0], strategie: [0,0], carriere: [0,0] };
  showScreen('screen-quiz');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function renderQuestion() {
  const q = questions[current];
  const total = questions.length;

  document.getElementById('progress').style.width = ((current / total) * 100) + '%';
  document.getElementById('q-counter').textContent = `Question ${current + 1} / ${total}`;

  const catEl = document.getElementById('q-cat');
  catEl.textContent = q.catLabel;
  catEl.className = 'quiz-cat c-' + q.cat;

  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-hint').textContent = q.hint;

  const answersEl = document.getElementById('answers');
  const shuffledAnswers = q.answers.map((a, i) => ({ text: a, orig: i }));
  shuffle(shuffledAnswers);
  q._shuffled = shuffledAnswers;

  answersEl.innerHTML = shuffledAnswers.map((a, i) => `
    <button class="answer-btn" onclick="answer(${i})">
      <span class="answer-letter">${String.fromCharCode(65+i)}</span>
      ${a.text}
    </button>
  `).join('');

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('btn-next').className = 'btn-next';
}

function answer(idx) {
  const q = questions[current];
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => b.disabled = true);

  const chosen = q._shuffled[idx];
  const isCorrect = chosen.orig === q.correct;

  catScores[q.cat][1]++;

  if (isCorrect) {
    btns[idx].classList.add('correct');
    score++;
    catScores[q.cat][0]++;
    showFeedback(true, '✓ ' + q.explanation);
  } else {
    btns[idx].classList.add('wrong');
    // Reveal correct
    q._shuffled.forEach((a, i) => {
      if (a.orig === q.correct) btns[i].classList.add('reveal');
    });
    showFeedback(false, '✗ ' + q.explanation);
  }

  document.getElementById('btn-next').className = 'btn-next show';
  document.getElementById('btn-next').textContent =
    current + 1 < questions.length ? 'Question suivante →' : 'Voir mes résultats →';
}

function showFeedback(ok, text) {
  const el = document.getElementById('feedback');
  el.className = 'feedback show ' + (ok ? 'ok' : 'ko');
  el.textContent = text;
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('progress').style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  let emoji, title, sub;
  if (pct >= 85) { emoji = '🏆'; title = 'Excellent !'; sub = "Tu maîtrises le sujet. Prêt pour l'entretien RH."; }
  else if (pct >= 65) { emoji = '💪'; title = 'Bon niveau'; sub = "Quelques points à consolider — relance le quiz sur les zones faibles."; }
  else if (pct >= 45) { emoji = '📚'; title = 'À renforcer'; sub = "Continue la préparation — les fondamentaux finance méritent plus d'attention."; }
  else { emoji = '🔁'; title = 'À retravailler'; sub = "Recommence le quiz après avoir relu les fiches clés."; }

  document.getElementById('r-emoji').textContent = emoji;
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-score').textContent = score + '/' + questions.length;
  document.getElementById('r-sub').textContent = sub;

  const catNames = {
    chiffres: '📊 Chiffres TotalEnergies',
    finance: '💰 Finance Corporate',
    strategie: '🌍 Stratégie Groupe',
    carriere: '🎯 Trajectoire & Pitch'
  };

  const breakdown = document.getElementById('r-breakdown');
  breakdown.innerHTML = Object.entries(catScores).map(([cat, [ok, total]]) => {
    const p = total > 0 ? Math.round((ok/total)*100) : 0;
    const cls = p >= 80 ? 'good' : p >= 50 ? 'mid' : 'bad';
    return `<div class="rb-row">
      <span class="rb-label">${catNames[cat]}</span>
      <span class="rb-val ${cls}">${ok}/${total} (${p}%)</span>
    </div>`;
  }).join('');

  showScreen('screen-result');
}

function restartQuiz() {
  startQuiz();
}
</script>
</body>
</html>
